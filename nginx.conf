##
## nginx.conf — Arya Kuwar Portfolio
## Drop this in /etc/nginx/sites-available/portfolio
## then: ln -s /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/
## Requires certbot SSL cert — see DEPLOY.md
##

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL ──────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Root ─────────────────────────────────────────────────
    root  /var/www/portfolio;
    index index.html;

    # ── Security Headers ─────────────────────────────────────
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; object-src 'none'; upgrade-insecure-requests;" always;
    add_header X-Frame-Options              "DENY"                            always;
    add_header X-Content-Type-Options       "nosniff"                         always;
    add_header X-XSS-Protection            "1; mode=block"                   always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy          "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Strict-Transport-Security   "max-age=63072000; includeSubDomains; preload" always;
    add_header Cross-Origin-Opener-Policy  "same-origin"                     always;
    add_header Cross-Origin-Embedder-Policy "require-corp"                   always;
    add_header Cross-Origin-Resource-Policy "same-origin"                    always;

    # Remove server version info
    server_tokens off;

    # ── Cache static assets ───────────────────────────────────
    location ~* \.(css|js|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-apply security headers (add_header is not inherited into location blocks)
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~* \.(html)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Block dotfiles ─────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Block backup / config files ────────────────────────────
    location ~* \.(bak|conf|dist|fla|inc|ini|log|psd|sh|sql|swp)$ {
        deny all;
        return 404;
    }

    # ── Main location ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 404 ───────────────────────────────────────────────────
    error_page 404 /index.html;
}
